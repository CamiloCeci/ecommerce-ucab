<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce UCAB | Inicio</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Tienda UCAB</div>
            <button id="theme-toggle">Tema 🌙/☀️</button>
            <form id="login-form">
                <input type="email" id="email" placeholder="Correo" required>
                <input type="password" id="password" placeholder="Clave" required>
                <button type="submit">Ingresar</button>
            </form>
        </nav>
    </header>
    
    <main>
        <section class="hero-banner">
            <h1>Descubre los mejores productos</h1>
            <button id="cta-catalog">Ver Catálogo</button>
        </section>
        
        </main>

    <footer>
        <div id="network-status" class="status-online">🟢 Online</div> </footer>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
