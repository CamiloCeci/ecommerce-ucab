<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce UCAB | Iniciar Sesión</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer;">Tienda UCAB</div>
            <button id="theme-toggle" class="btn-icon">Tema 🌙/☀️</button>
        </nav>
    </header>

    <main class="container-auth">
        <section class="auth-card">
            <h2>Iniciar Sesión</h2>
            <p class="auth-instruction" style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem; text-align: center;">
                Ingresa tus credenciales corporativas o de estudiante.
            </p>
            
            <form id="login-page-form">
                <div class="form-group">
                    <label for="login-email">Correo Electrónico</label>
                    <input type="email" id="login-email" placeholder="ejemplo@ucab.ve" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 0.5rem;">Ingresar al Sistema</button>
            </form>
            
            <div class="auth-links">
                <p>¿No tienes una cuenta? <a href="registro.html">Regístrate aquí</a></p>
                <p style="margin-top: 0.5rem;"><a href="recuperar.html">¿Olvidaste tu contraseña?</a></p>
            </div>
        </section>
    </main>

    <footer>
        <div id="network-status" class="status-online">🟢 Online</div>
        <p>&copy; 2026 UCAB - Programación Orientada a la Web</p>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
