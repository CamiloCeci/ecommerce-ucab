<main class="container-auth">
    <section class="auth-card">
        <h2>Crear Cuenta Nueva</h2>
        <p class="auth-instruction">Completa el formulario para registrarte en el sistema UCAB.</p>
        
        <form id="register-form">
            <div class="form-group">
                <label for="reg-name">Nombre Completo</label>
                <input type="text" id="reg-name" placeholder="Tu Nombre Completo" required>
            </div>
            <div class="form-group">
                <label for="reg-email">Correo Electrónico</label>
                <input type="email" id="reg-email" placeholder="estudiante@ucab.ve" required>
            </div>
            <div class="form-group">
                <label for="reg-password">Contraseña</label>
                <input type="password" id="reg-password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label for="reg-avatar">URL de Imagen de Avatar</label>
                <input type="url" id="reg-avatar" placeholder="https://picsum.photos/100">
            </div>
            <div class="form-group">
                <label for="reg-address">Dirección de Envío</label>
                <input type="text" id="reg-address" placeholder="Montalbán, Caracas" required>
            </div>
            <div class="form-group">
                <label for="reg-role">Rol de Usuario</label>
                <select id="reg-role" required>
                    <option value="Cliente">Cliente</option>
                    <option value="Administrador">Administrador</option>
                </select>
            </div>
            
            <button type="submit" class="btn-primary btn-full-width">Registrar Cuenta</button>
        </form>
        
        <div class="auth-links">
            <p>¿Ya tienes una cuenta? <a href="login.html">Inicia Sesión aquí</a></p>
        </div>
    </section>
</main>
